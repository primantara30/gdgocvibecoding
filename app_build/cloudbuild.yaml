steps:
  # 1. Build the container image for the Next.js app
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/geo-social-aid-mis:$COMMIT_SHA', '.']

  # 2. Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/geo-social-aid-mis:$COMMIT_SHA']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'geo-social-aid-mis'
      - '--image'
      - 'gcr.io/$PROJECT_ID/geo-social-aid-mis:$COMMIT_SHA'
      - '--region'
      - 'asia-southeast2'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'DATABASE_URL=$_DATABASE_URL' # Passed from Cloud Build triggers

images:
  - 'gcr.io/$PROJECT_ID/geo-social-aid-mis:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY

